seed: 42
data:
  dataset: LEVIR-CD
  data_path: ./data/LEVIR-CD-filtred
  subset: all
adaptive_algorithm:
  patch_size: 1
  components: 2
  variance_ratio: null
  whitening: true
  threshold:
    otsu_scale: 0.9781
  postprocessing:
    median_kernel: 3
    opening_kernel: 5
    closing_kernel: 5
    min_area: 256
    fill_holes: true
experiments:
  split: test
  max_samples: null
  method_set: research
  save_visualizations: true
  visualization_samples: 3
research_protocol:
  split_root: ./data
  results_dir: ./results
  max_tune_samples: 24
  max_eval_samples: 80
  bootstrap_iterations: 2000
classical_parameters:
  sigma: auto
  clahe:
    clip_limit: 2.0
    tile_grid_size: 16
  adaptive_threshold:
    block_size: 35
    c: -2.0
  canny:
    low: 50
    high: 150
